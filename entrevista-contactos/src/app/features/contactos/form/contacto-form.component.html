<!-- Navbar -->
<nav class="navbar navbar-dark navbar-custom px-4">
  <div class="d-flex align-items-center gap-2">
    <button class="btn btn-link text-white p-0 me-1" (click)="cancelar()" title="Volver">
      <i class="bi bi-arrow-left fs-5"></i>
    </button>
    <i class="bi bi-person-vcard-fill fs-5"></i>
    <span class="navbar-brand mb-0 fw-bold">
      {{ isEdit ? 'Editar Contacto' : 'Nuevo Contacto' }}
    </span>
  </div>
</nav>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

      @if (loading) {
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="text-muted mt-2 small">Cargando datos...</p>
        </div>
      } @else {

        <div class="card">
          <div class="card-body p-4">

            @if (errorMsg) {
              <div class="alert alert-danger d-flex align-items-center gap-2 py-2">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span>{{ errorMsg }}</span>
              </div>
            }

            <form [formGroup]="form" (ngSubmit)="submit()">

              <div class="mb-3">
                <label class="form-label fw-semibold" for="rutContacto">
                  RUT <span class="text-danger">*</span>
                </label>
                <input
                  id="rutContacto"
                  type="text"
                  class="form-control"
                  formControlName="rutContacto"
                  placeholder="12345678-9"
                  [class.is-invalid]="form.get('rutContacto')?.invalid && form.get('rutContacto')?.touched"
                />
                <div class="invalid-feedback">El RUT es requerido</div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold" for="nombreContacto">
                  Nombre <span class="text-danger">*</span>
                </label>
                <input
                  id="nombreContacto"
                  type="text"
                  class="form-control"
                  formControlName="nombreContacto"
                  placeholder="Nombre completo"
                  [class.is-invalid]="form.get('nombreContacto')?.invalid && form.get('nombreContacto')?.touched"
                />
                <div class="invalid-feedback">El nombre es requerido</div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold" for="abreviacion">Abreviación</label>
                <input
                  id="abreviacion"
                  type="text"
                  class="form-control"
                  formControlName="abreviacion"
                  placeholder="Ej: J. García"
                />
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold" for="telefono">Teléfono</label>
                <input
                  id="telefono"
                  type="tel"
                  class="form-control"
                  formControlName="telefono"
                  placeholder="+56 9 1234 5678"
                />
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold" for="email">Email</label>
                <input
                  id="email"
                  type="email"
                  class="form-control"
                  formControlName="email"
                  placeholder="ejemplo@correo.com"
                  [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
                />
                <div class="invalid-feedback">Ingrese un email válido</div>
              </div>

              <div class="d-flex justify-content-end gap-2 pt-2 border-top">
                <button type="button" class="btn btn-outline-secondary" (click)="cancelar()">
                  <i class="bi bi-x-lg me-1"></i>Cancelar
                </button>
                <button type="submit" class="btn btn-primary" [disabled]="saving">
                  @if (saving) {
                    <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                    Guardando...
                  } @else {
                    <i class="bi bi-check-lg me-1"></i>
                    {{ isEdit ? 'Actualizar' : 'Crear' }}
                  }
                </button>
              </div>

            </form>
          </div>
        </div>

      }
    </div>
  </div>
</div>
