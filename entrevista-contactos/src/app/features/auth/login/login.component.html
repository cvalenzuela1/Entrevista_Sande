<div class="login-wrapper">
  <div class="login-card">
    <h1>Acceso al Sistema</h1>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input
          id="usuario"
          type="text"
          formControlName="usuario"
          placeholder="Ingrese su usuario"
          [class.field-error]="form.get('usuario')?.invalid && form.get('usuario')?.touched"
        />
        @if (form.get('usuario')?.hasError('required') && form.get('usuario')?.touched) {
          <span class="error-text">El usuario es requerido</span>
        }
      </div>

      <div class="form-group">
        <label for="clave">Contraseña</label>
        <input
          id="clave"
          type="password"
          formControlName="clave"
          placeholder="Ingrese su contraseña"
          [class.field-error]="form.get('clave')?.invalid && form.get('clave')?.touched"
        />
        @if (form.get('clave')?.hasError('required') && form.get('clave')?.touched) {
          <span class="error-text">La contraseña es requerida</span>
        }
      </div>

      @if (errorMsg) {
        <div class="alert-error">{{ errorMsg }}</div>
      }

      <button type="submit" class="btn-submit" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>
  </div>
</div>
